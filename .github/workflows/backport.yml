name: Backport to Develop

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backport:
    name: Backport to Develop
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backport branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_SHA=${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          BACKPORT_BRANCH="backport/pr-${PR_NUMBER}-to-develop"
          
          echo "Creating backport branch: $BACKPORT_BRANCH"
          
          git fetch origin develop
          git checkout -b $BACKPORT_BRANCH origin/develop

          # Detect whether the merge commit has more than one parent (true merge commit).
          # If so, use -m 1 (mainline = first parent) when cherry-picking.
          PARENTS=$(git cat-file -p "$MERGE_SHA" | grep -c '^parent ')
          if [ "$PARENTS" -gt 1 ]; then
            CHERRY_PICK_ARGS="-m 1"
          else
            CHERRY_PICK_ARGS=""
          fi

          set +e
          git cherry-pick $CHERRY_PICK_ARGS "$MERGE_SHA"
          CP_STATUS=$?
          set -e

          # Case 1: cherry-pick failed but produced no conflicts and no staged changes
          # → all changes from the PR are already present on develop (no-op).
          # This is typical of release PRs where the changes originated in develop.
          if [ "$CP_STATUS" -ne 0 ] && [ -z "$(git status --porcelain)" ]; then
            git cherry-pick --skip || true
            echo "✅ Nothing to backport — all changes from PR #${PR_NUMBER} are already in develop."
            gh pr comment "$PR_NUMBER" --body "✅ **Backport automático no necesario**

          Todos los cambios del PR #${PR_NUMBER} ya están presentes en \`develop\` (esto es normal en PRs de release que partieron desde \`develop\`)." || true
            exit 0
          fi

          if [ "$CP_STATUS" -eq 0 ]; then
            git push origin $BACKPORT_BRANCH

            gh pr create \
              --base develop \
              --head $BACKPORT_BRANCH \
              --title "🔄 Backport: $PR_TITLE" \
              --body "## Backport automático

          Este PR fue creado automáticamente para backportar los cambios del PR #${PR_NUMBER} a develop.

          **PR Original:** #${PR_NUMBER}
          **Autor Original:** @${{ github.event.pull_request.user.login }}

          ---
          ⚠️ Revisar antes de mergear." \
              --label "backport,automated"
          else
            echo "Cherry-pick failed due to conflicts"
            git cherry-pick --abort || true

            gh pr comment "$PR_NUMBER" --body "⚠️ **Backport automático falló**

          No se pudo crear el backport a develop debido a conflictos.

          Crear manualmente:
          \`\`\`bash
          git fetch origin
          git checkout -b backport/pr-${PR_NUMBER}-to-develop origin/develop
          git cherry-pick -m 1 ${MERGE_SHA}
          # Resolver conflictos
          git push origin backport/pr-${PR_NUMBER}-to-develop
          \`\`\`"
            exit 1
          fi

