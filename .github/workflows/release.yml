name: Auto Release Tag

# Crea un tag automático cuando se mergea a main desde una rama release/*

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  create-release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true && 
      startsWith(github.event.pull_request.head.ref, 'release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          # Extraer versión del nombre de la rama (release/v1.0.0 → v1.0.0)
          VERSION=$(echo $BRANCH_NAME | sed 's/release\///')
          
          # Si no tiene prefijo 'v', agregarlo
          if [[ ! $VERSION == v* ]]; then
            VERSION="v$VERSION"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const prTitle = '${{ github.event.pull_request.title }}';
            const prBody = `${{ github.event.pull_request.body }}`;
            
            // Crear el tag
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${version}`,
              sha: context.sha
            });
            
            // Crear el release
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Release ${version}`,
              body: `## ${prTitle}\n\n${prBody || 'No description provided.'}\n\n---\n\n🚀 Released from PR #${{ github.event.pull_request.number }}`,
              draft: false,
              prerelease: false
            });
            
            console.log(`Created release: ${version}`);

