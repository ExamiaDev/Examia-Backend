services:
  - type: web
    name: examia-backend
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      # ===== Mail (Brevo API HTTP — Render bloquea SMTP outbound en free) =====
      - key: MAIL_PROVIDER
        value: brevo-api
      - key: MAIL_FROM
        sync: false           # email remitente verificado en Brevo
      - key: MAIL_FROM_NAME
        value: Examia
      - key: BREVO_API_KEY
        sync: false           # API key v3 generada en panel de Brevo
