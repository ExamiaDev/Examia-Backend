spring:
  application:
    name: examia-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/examia}
      auto-index-creation: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAIL_SSL_ENABLE:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}
            required: false
  jackson:
    default-property-inclusion: non_null

  # Swagger / OpenAPI
  springdoc:
    swagger-ui:
      enabled: true
    api-docs:
      enabled: true

# Server configuration
server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:100}
      min-spare: ${TOMCAT_THREADS_MIN:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:50}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5000}

# JWT Configuration
jwt:
  # El secret debe ser una cadena Base64 de al menos 256 bits (32 bytes)
  # Para producción, configurar la variable de entorno JWT_SECRET con un valor seguro
  secret: ${JWT_SECRET:ZXhhbWlhLXNlY3JldC1rZXktZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # Disable mail health check to prevent timeout on Render

# Keep-alive configuration for Render free tier
# Renders free instances go to sleep after 15 minutes of inactivity
keep-alive:
  enabled: ${KEEP_ALIVE_ENABLED:false}  # Enable in production on Render
  url: ${KEEP_ALIVE_URL:}  # Set to your Render URL, e.g., https://examia-backend.onrender.com
  interval: ${KEEP_ALIVE_INTERVAL:840000}  # 14 minutes in milliseconds (less than Render's 15 min timeout)


