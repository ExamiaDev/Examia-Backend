spring:
  application:
    name: examia-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/examia}
      auto-index-creation: false
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jackson:
    default-property-inclusion: non_null
  # Swagger / OpenAPI
  springdoc:
    swagger-ui:
      enabled: true
    api-docs:
      enabled: true

# Server configuration
server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:100}
      min-spare: ${TOMCAT_THREADS_MIN:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:50}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:5000}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:ZXhhbWlhLXNlY3JldC1rZXktZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

mail:
  from: ${MAIL_FROM:}

# Keep-alive configuration for Render free tier
keep-alive:
  enabled: ${KEEP_ALIVE_ENABLED:false}
  url: ${KEEP_ALIVE_URL:}
  interval: ${KEEP_ALIVE_INTERVAL:840000}