spring:
  application:
    name: examia-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/examia}

  # Mail configuration (Gmail SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Jackson configuration
  jackson:
    default-property-inclusion: non_null

  # Swagger / OpenAPI
  springdoc:
    swagger-ui:
      enabled: true
    api-docs:
      enabled: true

# Server configuration
server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  # El secret debe ser una cadena Base64 de al menos 256 bits (32 bytes)
  # Para producción, configurar la variable de entorno JWT_SECRET con un valor seguro
  secret: ${JWT_SECRET:ZXhhbWlhLXNlY3JldC1rZXktZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # Disable mail health check to prevent timeout on Render


